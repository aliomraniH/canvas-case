<!DOCTYPE html>
<style>
  .cm-container {
    width: 760px;
    margin: 20px auto;
    font-family: Lato, 'Helvetica Neue', Arial, Helvetica, sans-serif;
    color: #1f2933;
  }
  .cm-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .cm-title { font-size: 20px; font-weight: bold; }
  .cm-subtitle { font-size: 13px; color: #66707a; }
  .cm-chart-card {
    padding: 16px;
    border: 1px solid #d4d4d4;
    border-radius: 6px;
  }
  .cm-hint { font-size: 11px; color: #99a3ad; margin-top: 6px; }

  /* Diagnostics overlay (hidden until Shift+D) */
  #cm-diagnostics {
    position: fixed;
    top: 12px;
    right: 12px;
    max-height: 80vh;
    overflow: auto;
    width: 360px;
    background: rgba(17, 24, 33, 0.95);
    color: #d7f5e9;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 11px;
    padding: 12px 14px;
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    z-index: 9999;
  }
  #cm-diagnostics.cm-hidden { display: none; }
  #cm-diagnostics h3 { margin: 0 0 8px; font-size: 12px; color: #9bd1fa; }
  #cm-diagnostics table { width: 100%; border-collapse: collapse; }
  #cm-diagnostics td { padding: 2px 4px; vertical-align: top; }
  #cm-diagnostics td.k { color: #f797b9; white-space: nowrap; padding-right: 10px; }
</style>

<div id="cm-container" class="cm-container">
  <div class="cm-header">
    <div class="cm-title">Weight Trajectory</div>
    <div class="cm-subtitle">% total body weight loss (TBWL) vs. baseline</div>
  </div>
  <div class="cm-chart-card">
    <div id="cm-chart"></div>
    <div class="cm-hint">Hover a point for details. Press <strong>Shift+D</strong> for diagnostics.</div>
  </div>
</div>

<div id="cm-diagnostics" class="cm-hidden">
  <h3>Pipeline Diagnostics</h3>
  <table id="cm-diagnostics-body"></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// ───────────────────────────────────────────────────────────────
// Shared chart geometry
// ───────────────────────────────────────────────────────────────
const CM_SIZE = {
  width: 700, height: 420,
  marginTop: 24, marginRight: 70, marginBottom: 40, marginLeft: 56,
};

// Shared rendering context populated by ChartScaffold.init()
const CM = {
  svg: null,
  x: null,        // time scale (calendar date)
  y: null,        // linear scale (weight lbs)
  config: null,
};

function cmParseDate(value) {
  // date_obj is serialized by Django as an ISO string
  const d = new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

// ───────────────────────────────────────────────────────────────
// DiagnosticsPanel — defined FIRST so every component can record
// timestamps during its own init()/render().
// ───────────────────────────────────────────────────────────────
const DiagnosticsPanel = {
  timestamps: {},
  _visible: false,

  recordTimestamp(component, ts) {
    this.timestamps[component] = ts;
    if (this._visible) this.render();
  },

  render() {
    const body = document.getElementById('cm-diagnostics-body');
    if (!body) return;
    const rows = Object.entries(this.timestamps)
      .map(([k, v]) => `<tr><td class="k">${k}</td><td>${v}</td></tr>`)
      .join('');
    body.innerHTML = rows;
  },

  toggle() {
    this._visible = !this._visible;
    const panel = document.getElementById('cm-diagnostics');
    if (!panel) return;
    panel.classList.toggle('cm-hidden', !this._visible);
    if (this._visible) this.render();
  },
};

// ───────────────────────────────────────────────────────────────
// 1. ChartScaffold — SVG canvas + axes. Runs first.
// ───────────────────────────────────────────────────────────────
const ChartScaffold = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init(config) {
    CM.config = config || {};
    this._data = config || {};
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[ChartScaffold] init() at ${this._loadedAt}`);

    const mount = document.getElementById('cm-chart');
    mount.innerHTML = '';

    CM.svg = d3.create('svg')
      .attr('width', CM_SIZE.width)
      .attr('height', CM_SIZE.height)
      .attr('viewBox', [0, 0, CM_SIZE.width, CM_SIZE.height])
      .attr('style', 'max-width: 100%; height: auto; overflow: visible; font-size: 12px;');

    // Scales start empty; render(data) sets their domains.
    CM.x = d3.scaleTime().range([CM_SIZE.marginLeft, CM_SIZE.width - CM_SIZE.marginRight]);
    CM.y = d3.scaleLinear().range([CM_SIZE.height - CM_SIZE.marginBottom, CM_SIZE.marginTop]);

    CM.svg.append('g').attr('class', 'cm-x-axis')
      .attr('transform', `translate(0,${CM_SIZE.height - CM_SIZE.marginBottom})`);
    CM.svg.append('g').attr('class', 'cm-y-axis')
      .attr('transform', `translate(${CM_SIZE.marginLeft},0)`);

    mount.append(CM.svg.node());
    DiagnosticsPanel.recordTimestamp('ChartScaffold.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) { console.error('[ChartScaffold] render() before init()'); return; }
    this._data = data || this._data;
    this._loadedAt = new Date().toISOString();

    const points = (DataPointLayer._data || []);
    const dates = points.map(d => cmParseDate(d.date_obj)).filter(Boolean);
    const weights = points.map(d => +d.value_lbs);
    const baseline = BaselineLayer._data ? +BaselineLayer._data.value_lbs : null;
    if (baseline != null) weights.push(baseline);

    if (dates.length) {
      CM.x.domain(d3.extent(dates));
    } else {
      const now = new Date();
      CM.x.domain([d3.timeMonth.offset(now, -1), now]);
    }
    if (weights.length) {
      const lo = d3.min(weights), hi = d3.max(weights);
      const pad = Math.max((hi - lo) * 0.1, 2);
      CM.y.domain([lo - pad, hi + pad]).nice();
    } else {
      CM.y.domain([0, 1]);
    }

    CM.svg.select('.cm-x-axis').call(d3.axisBottom(CM.x).ticks(6).tickSizeOuter(0));
    CM.svg.select('.cm-y-axis').call(d3.axisLeft(CM.y).ticks(6))
      .call(g => {
        g.selectAll('.cm-y-label').remove();
        g.append('text').attr('class', 'cm-y-label')
          .attr('x', -CM_SIZE.marginLeft).attr('y', 12)
          .attr('fill', 'currentColor').attr('text-anchor', 'start')
          .text('Weight (lbs)');
      });

    DiagnosticsPanel.recordTimestamp('ChartScaffold.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[ChartScaffold] refresh() with no data'); return; }
    console.log('[ChartScaffold] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.remove();
    CM.svg = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 2. BaselineLayer — horizontal dashed line at baseline weight.
// ───────────────────────────────────────────────────────────────
const BaselineLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('BaselineLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = data;
    this._loadedAt = new Date().toISOString();
    console.log(`[BaselineLayer] render() at ${this._loadedAt}`);

    // Ensure scaffold scales reflect the baseline value.
    ChartScaffold.render(ChartScaffold._data);

    const value = data ? +(data.value_lbs != null ? data.value_lbs : data.value) : null;
    CM.svg.selectAll('.cm-baseline').remove();
    if (value != null && CM.y) {
      const yPos = CM.y(value);
      const g = CM.svg.append('g').attr('class', 'cm-baseline');
      g.append('line')
        .attr('x1', CM_SIZE.marginLeft).attr('x2', CM_SIZE.width - CM_SIZE.marginRight)
        .attr('y1', yPos).attr('y2', yPos)
        .attr('stroke', '#f797b9').attr('stroke-width', 2).attr('stroke-dasharray', '6 4');
      g.append('text')
        .attr('x', CM_SIZE.width - CM_SIZE.marginRight + 4).attr('y', yPos)
        .attr('dy', '0.35em').attr('font-size', '11px').attr('fill', '#c44d76')
        .text(`Baseline ${value.toFixed(1)} lb`);
    }
    DiagnosticsPanel.recordTimestamp('BaselineLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[BaselineLayer] refresh() with no data'); return; }
    console.log('[BaselineLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.selectAll('.cm-baseline').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 3. DataPointLayer — patient weight line + dots over calendar dates.
// ───────────────────────────────────────────────────────────────
const DataPointLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('DataPointLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = Array.isArray(data) ? data : [];
    this._loadedAt = new Date().toISOString();
    console.log(`[DataPointLayer] render() at ${this._loadedAt} (${this._data.length} points)`);

    // Recompute scales now that data is known.
    ChartScaffold.render(ChartScaffold._data);

    const pts = this._data
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date)
      .sort((a, b) => a._date - b._date);

    CM.svg.selectAll('.cm-series').remove();
    const g = CM.svg.append('g').attr('class', 'cm-series');

    const line = d3.line().x(d => CM.x(d._date)).y(d => CM.y(d._w));
    g.append('path')
      .attr('fill', 'none').attr('stroke', '#3b8fcf').attr('stroke-width', 2.5)
      .attr('stroke-linejoin', 'round').attr('stroke-linecap', 'round')
      .attr('d', line(pts));

    g.selectAll('circle').data(pts).join('circle')
      .attr('cx', d => CM.x(d._date)).attr('cy', d => CM.y(d._w))
      .attr('r', 4).attr('fill', '#3b8fcf');

    DiagnosticsPanel.recordTimestamp('DataPointLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[DataPointLayer] refresh() with no data'); return; }
    console.log('[DataPointLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.selectAll('.cm-series').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 4. AnnotationLayer — % TBWL label at the latest data point.
// ───────────────────────────────────────────────────────────────
const AnnotationLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = data;
    this._loadedAt = new Date().toISOString();
    console.log(`[AnnotationLayer] render() at ${this._loadedAt}`);

    CM.svg.selectAll('.cm-annotation').remove();
    const points = DataPointLayer._data || [];
    if (data && points.length) {
      const last = points
        .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
        .filter(d => d._date)
        .sort((a, b) => a._date - b._date)
        .slice(-1)[0];
      if (last) {
        const pct = +data.tbwl_pct;
        // Clinical convention: positive TBWL = weight lost → show ↓ (good, green)
        //                      negative TBWL = weight gained → show ↑ (concern, red)
        const arrow = pct >= 0 ? '↓' : '↑';
        const g = CM.svg.append('g').attr('class', 'cm-annotation');
        g.append('text')
          .attr('x', CM.x(last._date)).attr('y', CM.y(last._w) - 14)
          .attr('text-anchor', 'middle').attr('font-size', '13px').attr('font-weight', 'bold')
          .attr('fill', pct >= 0 ? '#1f8a4c' : '#c0392b')
          .text(`${arrow}${Math.abs(pct).toFixed(1)}% TBWL`);
      }
    }
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[AnnotationLayer] refresh() with no data'); return; }
    console.log('[AnnotationLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.selectAll('.cm-annotation').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 5. TooltipManager — hover tooltip. Event-driven, no render().
// ───────────────────────────────────────────────────────────────
const TooltipManager = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,
  _tip: null,

  init(data) {
    this._data = Array.isArray(data) ? data : [];
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[TooltipManager] init() at ${this._loadedAt}`);

    this._tip = CM.svg.append('g').attr('class', 'cm-tooltip').attr('display', 'none');
    this._tip.append('circle').attr('r', 5).attr('fill', '#0f619f');
    this._tip.append('text').attr('text-anchor', 'middle').attr('y', -26)
      .attr('font-size', '11px').attr('fill', '#1f2933');

    CM.svg
      .on('pointermove', (e) => this._onMove(e))
      .on('pointerleave', () => this._tip.attr('display', 'none'))
      .on('touchstart', (e) => e.preventDefault());

    DiagnosticsPanel.recordTimestamp('TooltipManager.init', this._loadedAt);
  },

  _onMove(event) {
    const pts = (this._data || [])
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date);
    if (!pts.length) return;
    const [mx] = d3.pointer(event);
    const i = d3.leastIndex(pts, d => Math.abs(CM.x(d._date) - mx));
    const p = pts[i];
    this._tip.attr('display', null)
      .attr('transform', `translate(${CM.x(p._date)},${CM.y(p._w)})`);
    this._tip.select('text')
      .text(`${p.date_label}: ${(+p.value_lbs).toFixed(1)} lb (${(+p.tbwl_pct).toFixed(1)}%)`);
  },

  refresh() {
    if (!this._isInitialized) { console.warn('[TooltipManager] refresh() before init()'); return; }
    console.log('[TooltipManager] refresh()');
    this.init(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.on('pointermove', null).on('pointerleave', null).on('touchstart', null);
    if (this._tip) this._tip.remove();
    this._tip = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// Initialization — order matters.
// ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const chartData = JSON.parse('{{ chart_data_json|escapejs }}');

  ChartScaffold.init(chartData.chart_config);
  BaselineLayer.render(chartData.baseline_data);
  DataPointLayer.render(chartData.datapoints);
  AnnotationLayer.render(chartData.latest_annotation);
  TooltipManager.init(chartData.datapoints);

  // Re-render the visual layers now that all data is present so axes/baseline
  // reflect the full dataset.
  ChartScaffold.refresh();
  BaselineLayer.refresh();
  DataPointLayer.refresh();
  AnnotationLayer.refresh();

  // Record Python-side pipeline timestamps.
  Object.entries(chartData._pipeline_timestamps || {}).forEach(([k, v]) => {
    DiagnosticsPanel.recordTimestamp(`python.${k}`, v);
  });
  DiagnosticsPanel.recordTimestamp('js.domContentLoaded', new Date().toISOString());

  // Shift+D toggles diagnostics overlay.
  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'D' || e.key === 'd')) DiagnosticsPanel.toggle();
  });
});

// ───────────────────────────────────────────────────────────────
// Debug hooks exposed on window.
// ───────────────────────────────────────────────────────────────
window.refreshComponent = function (name) {
  const components = { ChartScaffold, BaselineLayer, DataPointLayer, AnnotationLayer };
  if (!components[name]) { console.error(`Unknown component: ${name}`); return; }
  console.log(`[DEBUG] Refreshing ${name}`);
  components[name].refresh();
};

window.refreshAll = function () {
  [ChartScaffold, BaselineLayer, DataPointLayer, AnnotationLayer].forEach(c => c.refresh());
};
</script>
