<!DOCTYPE html>
<style>
  .cm-container {
    width: 760px;
    margin: 20px auto;
    font-family: Lato, 'Helvetica Neue', Arial, Helvetica, sans-serif;
    color: #1f2933;
  }
  .cm-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .cm-title { font-size: 20px; font-weight: bold; }
  .cm-subtitle { font-size: 13px; color: #66707a; }
  .cm-chart-card {
    padding: 16px;
    border: 1px solid #d4d4d4;
    border-radius: 6px;
    background: #fff;
  }
  .cm-hint { font-size: 11px; color: #99a3ad; margin-top: 6px; }

  /* StatsBar — velocity figure + flag badges (v0.2 E3/E4) */
  .cm-statsbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    padding: 10px 14px;
    margin-bottom: 10px;
    border: 1px solid #e4e7eb;
    border-radius: 6px;
    background: #f8fafc;
  }
  .cm-velocity-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .cm-velocity-label {
    font-size: 11px;
    color: #8b95a1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .cm-badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    max-width: 420px;
  }
  .cm-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cm-badge-amber { background: #fdf1d7; color: #8a5a00; border: 1px solid #ecc55f; }
  .cm-badge-red   { background: #fbe4e4; color: #a02525; border: 1px solid #e58c8c; }
  .cm-flag-message { font-size: 12px; color: #5a646e; text-align: right; }

  /* Legend (v0.2 E2) */
  .cm-legend {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #5a646e;
    margin-top: 8px;
  }
  .cm-legend-swatch {
    width: 18px; height: 10px;
    background: rgba(91, 134, 173, 0.18);
    border-radius: 2px;
  }

  /* Degraded-state note (v0.2 E4) */
  .cm-data-note {
    margin-top: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: #6b7785;
    background: #f4f6f8;
    border-left: 3px solid #c3ccd5;
    border-radius: 0 4px 4px 0;
  }

  /* Diagnostics overlay (hidden until Shift+D) */
  #cm-diagnostics {
    position: fixed;
    top: 12px;
    right: 12px;
    max-height: 80vh;
    overflow: auto;
    width: 360px;
    background: rgba(17, 24, 33, 0.95);
    color: #d7f5e9;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 11px;
    padding: 12px 14px;
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    z-index: 9999;
  }
  #cm-diagnostics.cm-hidden { display: none; }
  #cm-diagnostics h3 { margin: 0 0 8px; font-size: 12px; color: #9bd1fa; }
  #cm-diagnostics table { width: 100%; border-collapse: collapse; }
  #cm-diagnostics td { padding: 2px 4px; vertical-align: top; }
  #cm-diagnostics td.k { color: #f797b9; white-space: nowrap; padding-right: 10px; }
</style>

<div id="cm-container" class="cm-container">
  <div class="cm-header">
    <div class="cm-title">Weight Trajectory</div>
    <div class="cm-subtitle">% total body weight loss (TBWL) vs. baseline</div>
  </div>
  <div id="cm-statsbar" class="cm-statsbar" style="display:none;"></div>
  <div class="cm-chart-card">
    <div id="cm-chart"></div>
    <div id="cm-legend" class="cm-legend" style="display:none;">
      <span class="cm-legend-swatch"></span>
      <span id="cm-legend-text"></span>
    </div>
    <div id="cm-data-note" class="cm-data-note" style="display:none;"></div>
    <div class="cm-hint">Hover a point for details. Press <strong>Shift+D</strong> for diagnostics.</div>
  </div>
</div>

<div id="cm-diagnostics" class="cm-hidden">
  <h3>Pipeline Diagnostics</h3>
  <table id="cm-diagnostics-body"></table>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// ───────────────────────────────────────────────────────────────
// Shared chart geometry
// ───────────────────────────────────────────────────────────────
const CM_SIZE = {
  width: 700, height: 420,
  marginTop: 24, marginRight: 86, marginBottom: 40, marginLeft: 56,
};

// Shared rendering context populated by ChartScaffold.init()
const CM = {
  svg: null,
  x: null,        // time scale (calendar date)
  y: null,        // linear scale (weight lbs)
  config: null,
};

function cmParseDate(value) {
  // date_obj is serialized by Django as an ISO string
  const d = new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

// ───────────────────────────────────────────────────────────────
// DiagnosticsPanel — defined FIRST so every component can record
// timestamps during its own init()/render().
// ───────────────────────────────────────────────────────────────
const DiagnosticsPanel = {
  timestamps: {},
  _visible: false,

  recordTimestamp(component, ts) {
    this.timestamps[component] = ts;
    if (this._visible) this.render();
  },

  render() {
    const body = document.getElementById('cm-diagnostics-body');
    if (!body) return;
    const rows = Object.entries(this.timestamps)
      .map(([k, v]) => `<tr><td class="k">${k}</td><td>${v}</td></tr>`)
      .join('');
    body.innerHTML = rows;
  },

  toggle() {
    this._visible = !this._visible;
    const panel = document.getElementById('cm-diagnostics');
    if (!panel) return;
    panel.classList.toggle('cm-hidden', !this._visible);
    if (this._visible) this.render();
  },
};

// ───────────────────────────────────────────────────────────────
// 0. StatsBar — velocity stat + flag badges above the chart (v0.2).
//    Pure HTML; all values precomputed server-side.
// ───────────────────────────────────────────────────────────────
const StatsBar = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  render(chartData) {
    this._isInitialized = true;
    this._data = chartData || {};
    this._loadedAt = new Date().toISOString();
    console.log(`[StatsBar] render() at ${this._loadedAt}`);

    const bar = document.getElementById('cm-statsbar');
    if (!bar) return;
    const stats = this._data.velocity_stats || {};
    const flags = Array.isArray(this._data.flags) ? this._data.flags : [];

    const badgeHtml = flags.map(f => {
      const sev = f.severity === 'red' ? 'cm-badge-red' : 'cm-badge-amber';
      return `<span class="cm-badge ${sev}" data-flag="${f.key}">${f.label}</span>` +
             `<span class="cm-flag-message">${f.message}</span>`;
    }).join('');

    bar.innerHTML =
      `<div class="cm-velocity">` +
      `<div class="cm-velocity-value" id="cm-velocity-value">${stats.display || '—'}</div>` +
      `<div class="cm-velocity-label">${stats.window_weeks || 4}-week velocity</div>` +
      `</div>` +
      `<div class="cm-badges">${badgeHtml}</div>`;
    bar.style.display = 'flex';

    DiagnosticsPanel.recordTimestamp('StatsBar.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[StatsBar] refresh() with no data'); return; }
    this.render(this._data);
  },

  destroy() {
    const bar = document.getElementById('cm-statsbar');
    if (bar) { bar.innerHTML = ''; bar.style.display = 'none'; }
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 1. ChartScaffold — SVG canvas + axes + fixed z-order layer groups.
//    Group order guarantees the band renders behind everything else
//    regardless of which layer refreshes last.
// ───────────────────────────────────────────────────────────────
const ChartScaffold = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init(config) {
    CM.config = config || {};
    this._data = config || {};
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[ChartScaffold] init() at ${this._loadedAt}`);

    const mount = document.getElementById('cm-chart');
    mount.innerHTML = '';

    CM.svg = d3.create('svg')
      .attr('width', CM_SIZE.width)
      .attr('height', CM_SIZE.height)
      .attr('viewBox', [0, 0, CM_SIZE.width, CM_SIZE.height])
      .attr('style', 'max-width: 100%; height: auto; overflow: visible; font-size: 12px;');

    // Scales start empty; render(data) sets their domains.
    CM.x = d3.scaleTime().range([CM_SIZE.marginLeft, CM_SIZE.width - CM_SIZE.marginRight]);
    CM.y = d3.scaleLinear().range([CM_SIZE.height - CM_SIZE.marginBottom, CM_SIZE.marginTop]);

    CM.svg.append('g').attr('class', 'cm-grid');
    CM.svg.append('g').attr('class', 'cm-x-axis')
      .attr('transform', `translate(0,${CM_SIZE.height - CM_SIZE.marginBottom})`);
    CM.svg.append('g').attr('class', 'cm-y-axis')
      .attr('transform', `translate(${CM_SIZE.marginLeft},0)`);

    // Fixed z-order: band < baseline < milestones < series < annotation < tooltip.
    CM.svg.append('g').attr('class', 'cm-layer-band');
    CM.svg.append('g').attr('class', 'cm-layer-baseline');
    CM.svg.append('g').attr('class', 'cm-layer-milestones');
    CM.svg.append('g').attr('class', 'cm-layer-series');
    CM.svg.append('g').attr('class', 'cm-layer-annotation');
    CM.svg.append('g').attr('class', 'cm-layer-tooltip');

    mount.append(CM.svg.node());
    DiagnosticsPanel.recordTimestamp('ChartScaffold.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) { console.error('[ChartScaffold] render() before init()'); return; }
    this._data = data || this._data;
    this._loadedAt = new Date().toISOString();

    const points = (DataPointLayer._data || []);
    const dates = points.map(d => cmParseDate(d.date_obj)).filter(Boolean);
    const weights = points.map(d => +d.value_lbs);
    const baseline = BaselineLayer._data ? +BaselineLayer._data.value_lbs : null;
    if (baseline != null) weights.push(baseline);

    // The expected band participates in the y-domain (it is plotted data);
    // milestone lines deliberately do NOT (suppression rule, server-mirrored).
    const bandPoints = (ExpectedBandLayer._data && ExpectedBandLayer._data.points) || [];
    bandPoints.forEach(p => {
      if (p.lower_lbs != null) weights.push(+p.lower_lbs);
      if (p.upper_lbs != null) weights.push(+p.upper_lbs);
    });

    if (dates.length) {
      CM.x.domain(d3.extent(dates));
    } else {
      const now = new Date();
      CM.x.domain([d3.timeMonth.offset(now, -1), now]);
    }
    if (weights.length) {
      const lo = d3.min(weights), hi = d3.max(weights);
      const pad = Math.max((hi - lo) * 0.1, 2);
      CM.y.domain([lo - pad, hi + pad]).nice();
    } else {
      CM.y.domain([0, 1]);
    }

    CM.svg.select('.cm-x-axis').call(d3.axisBottom(CM.x).ticks(6).tickSizeOuter(0))
      .call(g => {
        g.selectAll('.cm-x-label').remove();
        g.append('text').attr('class', 'cm-x-label')
          .attr('x', CM_SIZE.width - CM_SIZE.marginRight).attr('y', 34)
          .attr('fill', 'currentColor').attr('text-anchor', 'end')
          .text('Visit date');
      });
    CM.svg.select('.cm-y-axis').call(d3.axisLeft(CM.y).ticks(6))
      .call(g => {
        g.selectAll('.cm-y-label').remove();
        g.append('text').attr('class', 'cm-y-label')
          .attr('x', -CM_SIZE.marginLeft).attr('y', 12)
          .attr('fill', 'currentColor').attr('text-anchor', 'start')
          .text('Weight (lbs)');
      });

    // Subtle horizontal gridlines (E4). Plain SVG lines, not axis ticks, so
    // the Tier-2 `line[stroke-dasharray]` selector stays unambiguous.
    const grid = CM.svg.select('.cm-grid');
    grid.selectAll('line').remove();
    CM.y.ticks(6).forEach(t => {
      grid.append('line')
        .attr('x1', CM_SIZE.marginLeft).attr('x2', CM_SIZE.width - CM_SIZE.marginRight)
        .attr('y1', CM.y(t)).attr('y2', CM.y(t))
        .attr('stroke', '#eceff2').attr('stroke-width', 1);
    });

    DiagnosticsPanel.recordTimestamp('ChartScaffold.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[ChartScaffold] refresh() with no data'); return; }
    console.log('[ChartScaffold] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.remove();
    CM.svg = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 2. ExpectedBandLayer — expected-response corridor (v0.2 E2).
//    Low-opacity area fill, no stroke, behind the patient line.
// ───────────────────────────────────────────────────────────────
const ExpectedBandLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('ExpectedBandLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = data || null;
    this._loadedAt = new Date().toISOString();
    console.log(`[ExpectedBandLayer] render() at ${this._loadedAt}`);

    ChartScaffold.render(ChartScaffold._data);

    const g = CM.svg.select('.cm-layer-band');
    g.selectAll('*').remove();

    const pts = ((this._data && this._data.points) || [])
      .map(p => ({ ...p, _date: cmParseDate(p.date) }))
      .filter(p => p._date);

    if (pts.length >= 2) {
      // lower_pct (less loss) = higher weight = visual top of the corridor.
      const area = d3.area()
        .x(p => CM.x(p._date))
        .y0(p => CM.y(+p.lower_lbs))
        .y1(p => CM.y(+p.upper_lbs));
      g.append('path')
        .attr('class', 'cm-band-fill')
        .attr('fill', 'rgba(91, 134, 173, 0.18)')
        .attr('stroke', 'none')
        .attr('d', area(pts));
    }

    // Legend below the chart (HTML, not SVG).
    const legend = document.getElementById('cm-legend');
    const legendText = document.getElementById('cm-legend-text');
    if (legend && legendText) {
      const cfg = CM.config || {};
      if (pts.length >= 2 && cfg.legend_text) {
        legendText.textContent = cfg.legend_text;
        legend.style.display = 'flex';
      } else {
        legend.style.display = 'none';
      }
    }

    DiagnosticsPanel.recordTimestamp('ExpectedBandLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[ExpectedBandLayer] refresh() with no data'); return; }
    console.log('[ExpectedBandLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-band').selectAll('*').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 3. BaselineLayer — horizontal dashed line at baseline weight.
// ───────────────────────────────────────────────────────────────
const BaselineLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('BaselineLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = data;
    this._loadedAt = new Date().toISOString();
    console.log(`[BaselineLayer] render() at ${this._loadedAt}`);

    // Ensure scaffold scales reflect the baseline value.
    ChartScaffold.render(ChartScaffold._data);

    const value = data ? +(data.value_lbs != null ? data.value_lbs : data.value) : null;
    const g = CM.svg.select('.cm-layer-baseline');
    g.selectAll('*').remove();
    if (value != null && CM.y) {
      const yPos = CM.y(value);
      const inner = g.append('g').attr('class', 'cm-baseline');
      inner.append('line')
        .attr('x1', CM_SIZE.marginLeft).attr('x2', CM_SIZE.width - CM_SIZE.marginRight)
        .attr('y1', yPos).attr('y2', yPos)
        .attr('stroke', '#f797b9').attr('stroke-width', 2).attr('stroke-dasharray', '6 4');
      inner.append('text')
        .attr('x', CM_SIZE.width - CM_SIZE.marginRight + 4).attr('y', yPos)
        .attr('dy', '0.35em').attr('font-size', '11px').attr('fill', '#c44d76')
        .text(`Baseline ${value.toFixed(1)} lb`);
    }
    DiagnosticsPanel.recordTimestamp('BaselineLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[BaselineLayer] refresh() with no data'); return; }
    console.log('[BaselineLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-baseline').selectAll('*').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 4. MilestoneLayer — %TBWL milestone reference lines (v0.2 E1).
//    Server-side suppression decided which lines arrive here; this
//    layer draws exactly what it is given.
// ───────────────────────────────────────────────────────────────
const MilestoneLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('MilestoneLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = Array.isArray(data) ? data : [];
    this._loadedAt = new Date().toISOString();
    console.log(`[MilestoneLayer] render() at ${this._loadedAt} (${this._data.length} lines)`);

    ChartScaffold.render(ChartScaffold._data);

    const g = CM.svg.select('.cm-layer-milestones');
    g.selectAll('*').remove();

    this._data.forEach(m => {
      const yPos = CM.y(+m.weight_lbs);
      const inner = g.append('g').attr('class', 'cm-milestone').attr('data-pct', m.pct);
      inner.append('line')
        .attr('x1', CM_SIZE.marginLeft).attr('x2', CM_SIZE.width - CM_SIZE.marginRight)
        .attr('y1', yPos).attr('y2', yPos)
        .attr('stroke', m.crossed ? '#1f8a4c' : '#9aa5b1')
        .attr('stroke-width', 1.25)
        .attr('stroke-dasharray', '4 4')
        .attr('opacity', 0.9);
      inner.append('text')
        .attr('x', CM_SIZE.width - CM_SIZE.marginRight + 4).attr('y', yPos)
        .attr('dy', '0.35em').attr('font-size', '11px')
        .attr('fill', m.crossed ? '#1f8a4c' : '#7b8794')
        .text(m.label);
    });

    DiagnosticsPanel.recordTimestamp('MilestoneLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[MilestoneLayer] refresh() with no data'); return; }
    console.log('[MilestoneLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-milestones').selectAll('*').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 5. DataPointLayer — patient weight line + dots over calendar dates.
// ───────────────────────────────────────────────────────────────
const DataPointLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,
  _animated: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('DataPointLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = Array.isArray(data) ? data : [];
    this._loadedAt = new Date().toISOString();
    console.log(`[DataPointLayer] render() at ${this._loadedAt} (${this._data.length} points)`);

    // Recompute scales now that data is known.
    ChartScaffold.render(ChartScaffold._data);

    const pts = this._data
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date)
      .sort((a, b) => a._date - b._date);

    const g = CM.svg.select('.cm-layer-series');
    g.selectAll('*').remove();
    const inner = g.append('g').attr('class', 'cm-series');

    const line = d3.line().x(d => CM.x(d._date)).y(d => CM.y(d._w));
    inner.append('path')
      .attr('class', 'cm-series-path')
      .attr('fill', 'none').attr('stroke', '#3b8fcf').attr('stroke-width', 2.5)
      .attr('stroke-linejoin', 'round').attr('stroke-linecap', 'round')
      .attr('d', line(pts));

    inner.selectAll('circle').data(pts).join('circle')
      .attr('cx', d => CM.x(d._date)).attr('cy', d => CM.y(d._w))
      .attr('r', 4).attr('fill', '#3b8fcf');

    // Degraded-state notes (E4): single measurement / sparse series.
    const note = document.getElementById('cm-data-note');
    if (note) {
      if (pts.length === 1) {
        note.textContent = 'Single measurement — the trajectory will appear once the next weight is recorded.';
        note.style.display = 'block';
      } else if (pts.length === 2 || (pts.length > 2 &&
          ((pts[pts.length - 1]._date - pts[0]._date) / 86400000) / (pts.length - 1) > 30)) {
        note.textContent = 'Sparse data — trends between distant measurements are interpolated; interpretation limited.';
        note.style.display = 'block';
      } else {
        note.style.display = 'none';
      }
    }

    DiagnosticsPanel.recordTimestamp('DataPointLayer.render', this._loadedAt);
  },

  // Draw-in animation (E4), called ONCE after the final refresh pass so the
  // animated path is not replaced mid-flight. Dash trick on the path; the
  // attributes are removed at the end so no stray dasharray persists (and the
  // Tier-2 `line[stroke-dasharray]` selector never matches a path anyway).
  animateIn() {
    if (this._animated || !CM.svg) return;
    const path = CM.svg.select('.cm-layer-series .cm-series-path');
    if (path.empty() || !path.node().getTotalLength) return;
    const total = path.node().getTotalLength();
    if (!total) return;
    this._animated = true;
    path
      .attr('stroke-dasharray', `${total} ${total}`)
      .attr('stroke-dashoffset', total)
      .transition().duration(700).ease(d3.easeCubicOut)
      .attr('stroke-dashoffset', 0)
      .on('end', () => path.attr('stroke-dasharray', null).attr('stroke-dashoffset', null));
  },

  refresh() {
    if (!this._data) { console.warn('[DataPointLayer] refresh() with no data'); return; }
    console.log('[DataPointLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-series').selectAll('*').remove();
    this._data = null; this._isInitialized = false; this._animated = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 6. AnnotationLayer — % TBWL label at the latest data point.
// ───────────────────────────────────────────────────────────────
const AnnotationLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) this.init();
    this._data = data;
    this._loadedAt = new Date().toISOString();
    console.log(`[AnnotationLayer] render() at ${this._loadedAt}`);

    const g = CM.svg.select('.cm-layer-annotation');
    g.selectAll('*').remove();
    const points = DataPointLayer._data || [];
    if (data && points.length) {
      const last = points
        .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
        .filter(d => d._date)
        .sort((a, b) => a._date - b._date)
        .slice(-1)[0];
      if (last) {
        const pct = +data.tbwl_pct;
        // Clinical convention: positive TBWL = weight lost → show ↓ (good, green)
        //                      negative TBWL = weight gained → show ↑ (concern, red)
        const arrow = pct >= 0 ? '↓' : '↑';
        const inner = g.append('g').attr('class', 'cm-annotation');
        inner.append('text')
          .attr('x', CM.x(last._date)).attr('y', CM.y(last._w) - 14)
          .attr('text-anchor', 'middle').attr('font-size', '13px').attr('font-weight', 'bold')
          .attr('fill', pct >= 0 ? '#1f8a4c' : '#c0392b')
          .text(`${arrow}${Math.abs(pct).toFixed(1)}% TBWL`);
      }
    }
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[AnnotationLayer] refresh() with no data'); return; }
    console.log('[AnnotationLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-annotation').selectAll('*').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 7. TooltipManager — hover tooltip. Event-driven, no render().
// ───────────────────────────────────────────────────────────────
const TooltipManager = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,
  _tip: null,

  init(data) {
    this._data = Array.isArray(data) ? data : [];
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[TooltipManager] init() at ${this._loadedAt}`);

    const layer = CM.svg.select('.cm-layer-tooltip');
    layer.selectAll('*').remove();
    this._tip = layer.append('g').attr('class', 'cm-tooltip').attr('display', 'none');
    this._tip.append('circle').attr('r', 5).attr('fill', '#0f619f');
    this._tip.append('text').attr('text-anchor', 'middle').attr('y', -26)
      .attr('font-size', '11px').attr('fill', '#1f2933');

    CM.svg
      .on('pointermove', (e) => this._onMove(e))
      .on('pointerleave', () => this._tip.attr('display', 'none'))
      .on('touchstart', (e) => e.preventDefault());

    DiagnosticsPanel.recordTimestamp('TooltipManager.init', this._loadedAt);
  },

  _onMove(event) {
    const pts = (this._data || [])
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date);
    if (!pts.length) return;
    const [mx] = d3.pointer(event);
    const i = d3.leastIndex(pts, d => Math.abs(CM.x(d._date) - mx));
    const p = pts[i];
    this._tip.attr('display', null)
      .attr('transform', `translate(${CM.x(p._date)},${CM.y(p._w)})`);
    this._tip.select('text')
      .text(`${p.date_label}: ${(+p.value_lbs).toFixed(1)} lb (${(+p.tbwl_pct).toFixed(1)}% TBWL)`);
  },

  refresh() {
    if (!this._isInitialized) { console.warn('[TooltipManager] refresh() before init()'); return; }
    console.log('[TooltipManager] refresh()');
    this.init(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.on('pointermove', null).on('pointerleave', null).on('touchstart', null);
    if (this._tip) this._tip.remove();
    this._tip = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// Initialization — order matters.
// ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const chartData = JSON.parse('{{ chart_data_json|escapejs }}');

  StatsBar.render(chartData);
  ChartScaffold.init(chartData.chart_config);
  ExpectedBandLayer.render(chartData.expected_band);
  BaselineLayer.render(chartData.baseline_data);
  MilestoneLayer.render(chartData.milestones);
  DataPointLayer.render(chartData.datapoints);
  AnnotationLayer.render(chartData.latest_annotation);
  TooltipManager.init(chartData.datapoints);

  // Re-render the visual layers now that all data is present so axes, band,
  // and reference lines reflect the full dataset. Z-order is fixed by the
  // scaffold's layer groups, so refresh order no longer affects stacking.
  ChartScaffold.refresh();
  ExpectedBandLayer.refresh();
  BaselineLayer.refresh();
  MilestoneLayer.refresh();
  DataPointLayer.refresh();
  AnnotationLayer.refresh();
  DataPointLayer.animateIn();

  // Record Python-side pipeline timestamps.
  Object.entries(chartData._pipeline_timestamps || {}).forEach(([k, v]) => {
    DiagnosticsPanel.recordTimestamp(`python.${k}`, v);
  });
  DiagnosticsPanel.recordTimestamp('js.domContentLoaded', new Date().toISOString());

  // Shift+D toggles diagnostics overlay.
  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'D' || e.key === 'd')) DiagnosticsPanel.toggle();
  });
});

// ───────────────────────────────────────────────────────────────
// Debug hooks exposed on window.
// ───────────────────────────────────────────────────────────────
window.refreshComponent = function (name) {
  const components = {
    StatsBar, ChartScaffold, ExpectedBandLayer, BaselineLayer,
    MilestoneLayer, DataPointLayer, AnnotationLayer,
  };
  if (!components[name]) { console.error(`Unknown component: ${name}`); return; }
  console.log(`[DEBUG] Refreshing ${name}`);
  components[name].refresh();
};

window.refreshAll = function () {
  [StatsBar, ChartScaffold, ExpectedBandLayer, BaselineLayer,
   MilestoneLayer, DataPointLayer, AnnotationLayer].forEach(c => c.refresh());
};
</script>
