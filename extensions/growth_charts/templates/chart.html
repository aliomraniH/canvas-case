<!DOCTYPE html>
<style>
  .cm-container {
    /* Fluid below 760px: the right-chart-pane viewport can be narrower than
       the design width, and a fixed width clipped the right-aligned badge
       column off-screen (v0.2.1 fix). */
    width: auto;
    max-width: 760px;
    margin: 20px auto;
    padding: 0 12px;
    font-family: Lato, 'Helvetica Neue', Arial, Helvetica, sans-serif;
    color: #1f2933;
  }
  .cm-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .cm-title { font-size: 20px; font-weight: bold; }
  .cm-subtitle { font-size: 13px; color: #66707a; }
  .cm-chart-card {
    padding: 16px;
    border: 1px solid #d4d4d4;
    border-radius: 6px;
    background: #fff;
  }
  .cm-hint { font-size: 11px; color: #99a3ad; margin-top: 6px; }

  /* StatsBar — velocity figure + flag badges (v0.2 E3/E4) */
  .cm-statsbar {
    display: flex;
    flex-wrap: wrap;          /* badges drop below the figure when narrow */
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    padding: 10px 14px;
    margin-bottom: 10px;
    border: 1px solid #e4e7eb;
    border-radius: 6px;
    background: #f8fafc;
  }
  .cm-velocity-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .cm-headline-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.15;
    font-variant-numeric: tabular-nums;
    color: #1f8a4c;
  }
  .cm-headline-abs {
    font-size: 14px;
    font-weight: 600;
    color: #5a646e;
  }
  .cm-band-info-population {
    margin-top: 6px;
    font-size: 11.5px;
    color: #44505c;
  }
  .cm-velocity-label {
    font-size: 11px;
    color: #8b95a1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .cm-badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    max-width: 420px;
  }
  .cm-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cm-badge-amber { background: #fdf1d7; color: #8a5a00; border: 1px solid #ecc55f; }
  .cm-badge-red   { background: #fbe4e4; color: #a02525; border: 1px solid #e58c8c; }
  .cm-flag-message { font-size: 12px; color: #5a646e; text-align: right; }

  /* Legend (v0.2 E2) */
  .cm-legend {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #5a646e;
    margin-top: 8px;
  }
  .cm-legend-swatch {
    width: 18px; height: 10px;
    background: rgba(91, 134, 173, 0.18);
    border-radius: 2px;
  }

  /* Band citation info affordance (v0.2.3) */
  .cm-info-btn {
    border: none; background: none; cursor: pointer;
    color: #5b86ad; font-size: 13px; line-height: 1; padding: 0 2px;
  }
  .cm-info-btn:hover, .cm-info-btn:focus { color: #0f619f; }
  .cm-band-info {
    margin-top: 6px; padding: 8px 12px; font-size: 12px; color: #44505c;
    background: #f4f7fa; border: 1px solid #d9e2ea; border-radius: 4px;
    max-width: 560px;
  }
  .cm-band-info-trial { font-weight: 700; margin-bottom: 2px; }
  .cm-band-info-citation { color: #6b7785; font-size: 11px; margin-top: 4px; }
  .cm-band-info-disclosure {
    margin-top: 6px; padding: 6px 8px; font-size: 11.5px;
    background: #fdf1d7; border-left: 3px solid #ecc55f; color: #8a5a00;
    border-radius: 0 4px 4px 0;
  }

  /* Degraded-state note (v0.2 E4) */
  .cm-data-note {
    margin-top: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: #6b7785;
    background: #f4f6f8;
    border-left: 3px solid #c3ccd5;
    border-radius: 0 4px 4px 0;
  }

  /* Export button + print summary view (v0.3.0) */
  .cm-header-right { display: flex; align-items: baseline; gap: 10px; }
  .cm-export-btn {
    padding: 4px 12px;
    border: 1px solid #5b86ad;
    border-radius: 4px;
    background: #fff;
    color: #0f619f;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .cm-export-btn:hover, .cm-export-btn:focus { background: #f4f7fa; }

  /* Print-only blocks: hidden on screen, shown by @media print below. */
  .cm-print-only { display: none; }
  .cm-print-header {
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 2px solid #1f2933;
    font-size: 13px;
  }
  .cm-print-header .cm-print-name { font-size: 16px; font-weight: 700; }
  .cm-print-stats { margin-top: 10px; font-size: 12px; }
  .cm-print-stats table { width: 100%; border-collapse: collapse; }
  .cm-print-stats td { padding: 3px 8px 3px 0; vertical-align: top; }
  .cm-print-stats td.k { font-weight: 700; white-space: nowrap; width: 160px; }
  .cm-print-disclosure {
    margin-top: 8px; padding: 6px 8px; font-size: 11px;
    border-left: 3px solid #8a5a00; color: #1f2933;
  }
  .cm-print-footer {
    margin-top: 12px; padding-top: 6px;
    border-top: 1px solid #c3ccd5;
    font-size: 10px; color: #44505c;
  }
  .cm-print-footer div { margin-bottom: 2px; }

  @media print {
    body { background: #fff !important; }
    .cm-print-only { display: block; }
    /* Interactive / screen-only chrome never prints. The print stats block
       replaces the on-screen stats bar and legend (no duplication); tooltips
       and hover-only content are suppressed outright. */
    #cm-export-btn, .cm-hint, #cm-statsbar, #cm-legend, #cm-band-info,
    #cm-data-note, #cm-diagnostics { display: none !important; }
    .cm-layer-tooltip { display: none !important; }
    .cm-container { max-width: 100%; margin: 0; padding: 0; }
    .cm-chart-card { border: none; padding: 4px 0; }
    /* Long series (≥20 obs): the SVG keeps its viewBox aspect and is capped
       so header + chart + stats + footer fit a single portrait page. */
    #cm-chart svg { max-height: 88mm; height: auto; }
  }

  /* Event-log overlay (hidden until Shift+D; v0.4.0: dismissible, with
     support-report download and a read-only weight-data view) */
  #cm-diagnostics {
    position: fixed;
    top: 12px;
    right: 12px;
    max-height: 80vh;
    overflow: auto;
    width: 420px;
    background: rgba(17, 24, 33, 0.95);
    color: #d7f5e9;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 11px;
    padding: 12px 14px;
    border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    z-index: 9999;
  }
  #cm-diagnostics.cm-hidden { display: none; }
  #cm-diagnostics h3 { margin: 0 0 8px; font-size: 12px; color: #9bd1fa; }
  #cm-diagnostics table { width: 100%; border-collapse: collapse; }
  #cm-diagnostics td { padding: 2px 4px; vertical-align: top; }
  #cm-diagnostics td.k { color: #f797b9; white-space: nowrap; padding-right: 10px; }
  #cm-diagnostics td.o { color: #99a3ad; }
  .cm-log-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cm-log-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .cm-log-actions button {
    background: transparent; border: 1px solid #44505c; color: #d7f5e9;
    border-radius: 4px; font-size: 11px; cursor: pointer; padding: 2px 8px;
    font-family: inherit;
  }
  .cm-log-actions button:hover, .cm-log-actions button:focus { background: rgba(255,255,255,0.08); }
  #cm-log-close-btn { font-size: 14px; line-height: 1; padding: 2px 7px; }
  .cm-log-toggle { margin: 0 0 8px; display: flex; gap: 4px; }
  .cm-log-tab {
    background: transparent; border: 1px solid #44505c; color: #99a3ad;
    border-radius: 4px; font-size: 11px; padding: 2px 10px; cursor: pointer;
    font-family: inherit;
  }
  .cm-log-tab.cm-active { color: #d7f5e9; border-color: #9bd1fa; }
  #cm-log-caveat {
    margin: 0 0 8px; padding: 6px 8px; font-size: 11px;
    color: #ecc55f; border-left: 3px solid #ecc55f;
  }
  #cm-weight-table-wrap { max-height: 60vh; overflow: auto; }
  #cm-weight-table th {
    text-align: left; color: #9bd1fa; padding: 2px 6px 4px 0;
    font-weight: 600; white-space: nowrap;
  }
  #cm-weight-table td { padding: 2px 6px 2px 0; }
  #cm-log-fallback {
    max-height: 40vh; overflow: auto; white-space: pre-wrap;
    background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px;
    margin: 8px 0 0; font-family: inherit;
  }
</style>

<div id="cm-container" class="cm-container" tabindex="-1">
  <div class="cm-header">
    <div class="cm-title">Weight Trajectory</div>
    <div class="cm-header-right">
      <span class="cm-subtitle">% total body weight loss (TBWL) vs. baseline</span>
      <button id="cm-export-btn" class="cm-export-btn" type="button"
              title="Print or save this summary as a PDF">Export</button>
    </div>
  </div>
  <div id="cm-print-header" class="cm-print-only cm-print-header"></div>
  <div id="cm-statsbar" class="cm-statsbar" style="display:none;"></div>
  <div class="cm-chart-card">
    <div id="cm-chart"></div>
    <div id="cm-legend" class="cm-legend" style="display:none;">
      <span class="cm-legend-swatch"></span>
      <span id="cm-legend-text"></span>
      <button id="cm-band-info-btn" class="cm-info-btn" type="button"
              aria-label="About this reference band" aria-expanded="false"
              title="About this reference band">&#9432;</button>
    </div>
    <div id="cm-band-info" class="cm-band-info" hidden></div>
    <div id="cm-data-note" class="cm-data-note" style="display:none;"></div>
    <div class="cm-hint">Hover a point for details. Press <strong>Shift+D</strong> for technical log.</div>
  </div>
  <div id="cm-print-stats" class="cm-print-only cm-print-stats"></div>
  <div id="cm-print-footer" class="cm-print-only cm-print-footer"></div>
</div>

<div id="cm-diagnostics" class="cm-hidden" role="dialog" aria-label="Plugin event log">
  <div class="cm-log-header">
    <h3>Plugin event log — technical support only. Not for clinical use.</h3>
    <div class="cm-log-actions">
      <button id="cm-log-download-btn" type="button"
              title="Download support report (JSON)">Download</button>
      <button id="cm-log-close-btn" type="button" aria-label="Close event log"
              title="Close (Esc)">&times;</button>
    </div>
  </div>
  <div class="cm-log-toggle">
    <button id="cm-log-view-log" type="button" class="cm-log-tab cm-active">Event log</button>
    <button id="cm-log-view-data" type="button" class="cm-log-tab">Weight data</button>
  </div>
  <div id="cm-log-caveat" style="display:none;"></div>
  <table id="cm-diagnostics-body"></table>
  <div id="cm-weight-table-wrap" style="display:none;">
    <table id="cm-weight-table"></table>
  </div>
  <pre id="cm-log-fallback" style="display:none;"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// ───────────────────────────────────────────────────────────────
// Shared chart geometry
// ───────────────────────────────────────────────────────────────
const CM_SIZE = {
  width: 700, height: 420,
  marginTop: 24, marginRight: 86, marginBottom: 40, marginLeft: 56,
};

// Shared rendering context populated by ChartScaffold.init()
const CM = {
  svg: null,
  x: null,        // time scale (calendar date)
  y: null,        // linear scale (weight lbs)
  config: null,
};

function cmParseDate(value) {
  // date_obj is serialized by Django as an ISO string
  const d = new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

// ───────────────────────────────────────────────────────────────
// DiagnosticsPanel (internal name) — the user-facing "Plugin event
// log" overlay. Defined FIRST so every component can record event
// timestamps during its own init()/render(). v0.4.0: dismissible
// (×, Esc, Shift+D toggle), support-report download, and a read-only
// weight-data view. All DOM here is built with textContent — never
// markup interpolation. Support-report schema knowledge lives
// server-side in build_log_export; this object only fills the
// browser-only values (timestamp + browser identity) at download
// time and appends its own runtime entries.
// ───────────────────────────────────────────────────────────────
const DiagnosticsPanel = {
  entries: [],        // [{name, timestamp_utc, origin}] — server entries seeded by init(), JS entries appended
  _exportBase: null,  // server-built support-report scaffold
  _tableRows: [],     // server-derived weight-data rows
  _visible: false,
  _view: 'log',

  init(exportBase, tableRows) {
    this._exportBase = exportBase || null;
    this._tableRows = tableRows || [];
    this.entries = ((exportBase && exportBase.entries) || []).slice();
  },

  recordTimestamp(name, ts) {
    // Everything recorded through this path is the plugin's own code.
    this.entries.push({ name: name, timestamp_utc: ts, origin: 'plugin' });
    if (this._visible) this.render();
  },

  render() {
    const logTable = document.getElementById('cm-diagnostics-body');
    const dataWrap = document.getElementById('cm-weight-table-wrap');
    if (!logTable || !dataWrap) return;
    const isLog = this._view === 'log';
    const tabLog = document.getElementById('cm-log-view-log');
    const tabData = document.getElementById('cm-log-view-data');
    if (tabLog) tabLog.classList.toggle('cm-active', isLog);
    if (tabData) tabData.classList.toggle('cm-active', !isLog);
    logTable.style.display = isLog ? '' : 'none';
    dataWrap.style.display = isLog ? 'none' : '';
    if (isLog) this._renderLog(logTable);
    else this._renderData();
    this._renderCaveat(!isLog);
  },

  _renderLog(table) {
    table.textContent = '';
    this.entries.forEach((e) => {
      const tr = document.createElement('tr');
      [['k', e.name], [null, e.timestamp_utc], ['o', e.origin]].forEach(([cls, text]) => {
        const td = document.createElement('td');
        if (cls) td.className = cls;
        td.textContent = text;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  },

  _renderData() {
    const table = document.getElementById('cm-weight-table');
    if (!table) return;
    table.textContent = '';
    const head = document.createElement('tr');
    ['Date', 'Weight (lb)', 'Δ baseline (lb)', '%TBWL', 'Source/method'].forEach((h) => {
      const th = document.createElement('th');
      th.textContent = h;
      head.appendChild(th);
    });
    table.appendChild(head);
    this._tableRows.forEach((r) => {
      const tr = document.createElement('tr');
      const dateTd = document.createElement('td');
      const d = cmParseDate(r.capture_iso);
      dateTd.textContent = d ? d.toLocaleString() : (r.capture_iso || '—');
      dateTd.title = r.capture_iso; // full ISO as recorded (UTC-Z for FHIR-created)
      tr.appendChild(dateTd);
      [r.weight_display, r.delta_display, r.tbwl_display, r.source_method].forEach((v) => {
        const td = document.createElement('td');
        td.textContent = v;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  },

  // The chart's sparse/single-measurement caveat must also appear in the
  // weight-data view when active — mirrored from the live banner so the
  // two can never disagree.
  _renderCaveat(active) {
    const caveat = document.getElementById('cm-log-caveat');
    const src = document.getElementById('cm-data-note');
    if (!caveat) return;
    const text = (active && src && src.style.display !== 'none') ? src.textContent : '';
    caveat.textContent = text;
    caveat.style.display = text ? 'block' : 'none';
  },

  open() {
    this._visible = true;
    const panel = document.getElementById('cm-diagnostics');
    if (panel) panel.classList.remove('cm-hidden');
    this.render();
  },

  close() {
    this._visible = false;
    const panel = document.getElementById('cm-diagnostics');
    if (panel) panel.classList.add('cm-hidden');
    const fallback = document.getElementById('cm-log-fallback');
    if (fallback) fallback.style.display = 'none';
    // Focus returns to the chart container on dismiss (D1).
    const container = document.getElementById('cm-container');
    if (container) container.focus();
  },

  toggle() { this._visible ? this.close() : this.open(); },

  setView(view) {
    this._view = view === 'data' ? 'data' : 'log';
    this.render();
  },

  // Support-report download (v0.4.0). Tier 1 of the proven-fallback ladder:
  // Blob + anchor. The runtime guard falls back to a copyable view; the
  // print-pipeline reuse is the documented next tier if live verification
  // shows Blob downloads are blocked in the srcdoc iframe.
  downloadSupportReport() {
    const base = this._exportBase || {};
    const generatedAt = new Date().toISOString();
    const payload = Object.assign({}, base, {
      generated_at: generatedAt,
      user_agent: navigator.userAgent,
      entries: this.entries,
    });
    const json = JSON.stringify(payload, null, 2);
    const fname = 'cardiometabolic_tracker_log_' +
      generatedAt.slice(0, 19).replace(/:/g, '-') + 'Z.json';
    try {
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
      console.error('[EventLog] Blob download failed; showing copyable view', err);
      this._showCopyFallback(json);
    }
  },

  _showCopyFallback(json) {
    const pre = document.getElementById('cm-log-fallback');
    if (!pre) return;
    pre.textContent = json;
    pre.style.display = 'block';
  },
};

// ───────────────────────────────────────────────────────────────
// 0. StatsBar — velocity stat + flag badges above the chart (v0.2).
//    Pure HTML; all values precomputed server-side.
// ───────────────────────────────────────────────────────────────
const StatsBar = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  render(chartData) {
    this._isInitialized = true;
    this._data = chartData || {};
    this._loadedAt = new Date().toISOString();
    console.log(`[StatsBar] render() at ${this._loadedAt}`);

    const bar = document.getElementById('cm-statsbar');
    if (!bar) return;
    const stats = this._data.velocity_stats || {};
    const flags = Array.isArray(this._data.flags) ? this._data.flags : [];
    const headline = this._data.headline || null;

    const badgeHtml = flags.map(f => {
      const sev = f.severity === 'red' ? 'cm-badge-red' : 'cm-badge-amber';
      return `<span class="cm-badge ${sev}" data-flag="${f.key}">${f.label}</span>` +
             `<span class="cm-flag-message">${f.message}</span>`;
    }).join('');

    // Dual-metric headline (v0.2.5): %TBWL + absolute change in the patient's
    // display unit, both from the patient's own data. Falls back to the
    // velocity figure when there is no headline (empty/degraded series).
    const headlineHtml = headline
      ? `<div class="cm-headline" id="cm-headline">` +
        `<div class="cm-headline-value">${headline.pct_display}` +
        `<span class="cm-headline-abs" id="cm-headline-abs"> (${headline.abs_change_display} from ${headline.baseline_display} baseline)</span></div>` +
        `<div class="cm-velocity-label">total loss vs. baseline</div>` +
        `</div>`
      : '';

    bar.innerHTML =
      headlineHtml +
      `<div class="cm-velocity">` +
      `<div class="cm-velocity-value" id="cm-velocity-value">${stats.display || '—'}</div>` +
      `<div class="cm-velocity-label">${stats.window_weeks || 4}-week velocity</div>` +
      `</div>` +
      `<div class="cm-badges">${badgeHtml}</div>`;
    bar.style.display = 'flex';

    DiagnosticsPanel.recordTimestamp('StatsBar.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[StatsBar] refresh() with no data'); return; }
    this.render(this._data);
  },

  destroy() {
    const bar = document.getElementById('cm-statsbar');
    if (bar) { bar.innerHTML = ''; bar.style.display = 'none'; }
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 1. ChartScaffold — SVG canvas + axes + fixed z-order layer groups.
//    Group order guarantees the band renders behind everything else
//    regardless of which layer refreshes last.
// ───────────────────────────────────────────────────────────────
const ChartScaffold = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init(config) {
    CM.config = config || {};
    this._data = config || {};
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[ChartScaffold] init() at ${this._loadedAt}`);

    const mount = document.getElementById('cm-chart');
    mount.innerHTML = '';

    CM.svg = d3.create('svg')
      .attr('width', CM_SIZE.width)
      .attr('height', CM_SIZE.height)
      .attr('viewBox', [0, 0, CM_SIZE.width, CM_SIZE.height])
      .attr('style', 'max-width: 100%; height: auto; overflow: visible; font-size: 12px;');

    // Scales start empty; render(data) sets their domains.
    CM.x = d3.scaleTime().range([CM_SIZE.marginLeft, CM_SIZE.width - CM_SIZE.marginRight]);
    CM.y = d3.scaleLinear().range([CM_SIZE.height - CM_SIZE.marginBottom, CM_SIZE.marginTop]);

    CM.svg.append('g').attr('class', 'cm-grid');
    CM.svg.append('g').attr('class', 'cm-x-axis')
      .attr('transform', `translate(0,${CM_SIZE.height - CM_SIZE.marginBottom})`);
    CM.svg.append('g').attr('class', 'cm-y-axis')
      .attr('transform', `translate(${CM_SIZE.marginLeft},0)`);

    // Fixed z-order: band < baseline < milestones < series < annotation < tooltip.
    CM.svg.append('g').attr('class', 'cm-layer-band');
    CM.svg.append('g').attr('class', 'cm-layer-baseline');
    CM.svg.append('g').attr('class', 'cm-layer-milestones');
    CM.svg.append('g').attr('class', 'cm-layer-series');
    CM.svg.append('g').attr('class', 'cm-layer-annotation');
    CM.svg.append('g').attr('class', 'cm-layer-tooltip');

    mount.append(CM.svg.node());
    DiagnosticsPanel.recordTimestamp('ChartScaffold.init', this._loadedAt);
  },

  render(data) {
    if (!this._isInitialized) { console.error('[ChartScaffold] render() before init()'); return; }
    this._data = data || this._data;
    this._loadedAt = new Date().toISOString();

    const points = (DataPointLayer._data || []);
    const dates = points.map(d => cmParseDate(d.date_obj)).filter(Boolean);
    const weights = points.map(d => +d.value_lbs);
    const baseline = BaselineLayer._data ? +BaselineLayer._data.value_lbs : null;
    if (baseline != null) weights.push(baseline);

    // The expected band participates in the y-domain (it is plotted data);
    // milestone lines deliberately do NOT (suppression rule, server-mirrored).
    const bandPoints = (ExpectedBandLayer._data && ExpectedBandLayer._data.points) || [];
    bandPoints.forEach(p => {
      if (p.lower_lbs != null) weights.push(+p.lower_lbs);
      if (p.upper_lbs != null) weights.push(+p.upper_lbs);
    });

    if (dates.length) {
      CM.x.domain(d3.extent(dates));
    } else {
      const now = new Date();
      CM.x.domain([d3.timeMonth.offset(now, -1), now]);
    }
    if (weights.length) {
      const lo = d3.min(weights), hi = d3.max(weights);
      // Pad rule comes from the server (chart_config) — Python _axis_domain
      // is the source of truth for milestone suppression; never hardcode.
      const cfg = CM.config || {};
      const padFraction = cfg.axis_pad_fraction != null ? +cfg.axis_pad_fraction : 0.1;
      const padMin = cfg.axis_pad_min_lbs != null ? +cfg.axis_pad_min_lbs : 2;
      const pad = Math.max((hi - lo) * padFraction, padMin);
      CM.y.domain([lo - pad, hi + pad]).nice();
    } else {
      CM.y.domain([0, 1]);
    }

    CM.svg.select('.cm-x-axis').call(d3.axisBottom(CM.x).ticks(6).tickSizeOuter(0))
      .call(g => {
        g.selectAll('.cm-x-label').remove();
        g.append('text').attr('class', 'cm-x-label')
          .attr('x', CM_SIZE.width - CM_SIZE.marginRight).attr('y', 34)
          .attr('fill', 'currentColor').attr('text-anchor', 'end')
          .text('Visit date');
      });
    CM.svg.select('.cm-y-axis').call(d3.axisLeft(CM.y).ticks(6))
      .call(g => {
        g.selectAll('.cm-y-label').remove();
        g.append('text').attr('class', 'cm-y-label')
          .attr('x', -CM_SIZE.marginLeft).attr('y', 12)
          .attr('fill', 'currentColor').attr('text-anchor', 'start')
          .text('Weight (lbs)');
      });

    // Subtle horizontal gridlines (E4). Plain SVG lines, not axis ticks, so
    // the Tier-2 `line[stroke-dasharray]` selector stays unambiguous.
    const grid = CM.svg.select('.cm-grid');
    grid.selectAll('line').remove();
    CM.y.ticks(6).forEach(t => {
      grid.append('line')
        .attr('x1', CM_SIZE.marginLeft).attr('x2', CM_SIZE.width - CM_SIZE.marginRight)
        .attr('y1', CM.y(t)).attr('y2', CM.y(t))
        .attr('stroke', '#eceff2').attr('stroke-width', 1);
    });

    DiagnosticsPanel.recordTimestamp('ChartScaffold.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[ChartScaffold] refresh() with no data'); return; }
    console.log('[ChartScaffold] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.remove();
    CM.svg = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 2. ExpectedBandLayer — expected-response corridor (v0.2 E2).
//    Low-opacity area fill, no stroke, behind the patient line.
// ───────────────────────────────────────────────────────────────
const ExpectedBandLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('ExpectedBandLayer.init', this._loadedAt);
  },

  setData(data) {
    if (!this._isInitialized) this.init();
    this._data = data || null;
  },

  render(data) {
    if (data !== undefined) this.setData(data);
    this._loadedAt = new Date().toISOString();
    console.log(`[ExpectedBandLayer] render() at ${this._loadedAt}`);

    const g = CM.svg.select('.cm-layer-band');
    g.selectAll('*').remove();

    const pts = ((this._data && this._data.points) || [])
      .map(p => ({ ...p, _date: cmParseDate(p.date) }))
      .filter(p => p._date);

    if (pts.length >= 2) {
      // lower_pct (less loss) = higher weight = visual top of the corridor.
      const area = d3.area()
        .x(p => CM.x(p._date))
        .y0(p => CM.y(+p.lower_lbs))
        .y1(p => CM.y(+p.upper_lbs));
      g.append('path')
        .attr('class', 'cm-band-fill')
        .attr('fill', 'rgba(91, 134, 173, 0.18)')
        .attr('stroke', 'none')
        .attr('d', area(pts));
    }

    // Legend below the chart (HTML, not SVG).
    const legend = document.getElementById('cm-legend');
    const legendText = document.getElementById('cm-legend-text');
    const infoBtn = document.getElementById('cm-band-info-btn');
    const infoPanel = document.getElementById('cm-band-info');
    const bandVisible = pts.length >= 2 && (CM.config || {}).legend_text;
    if (legend && legendText) {
      if (bandVisible) {
        legendText.textContent = (CM.config || {}).legend_text;
        legend.style.display = 'flex';
      } else {
        legend.style.display = 'none';
      }
    }

    // "About this reference band" panel (v0.2.3): trial, summary, citation,
    // and — for synthesized bounds — the amber disclosure note. Toggled by
    // the legend's info button; Escape dismisses; never blocks the chart.
    if (infoBtn && infoPanel) {
      const meta = (this._data && this._data.band_metadata) || null;
      if (meta && bandVisible) {
        infoPanel.innerHTML =
          `<div class="cm-band-info-trial">About this reference band — ${meta.trial}</div>` +
          `<div>${meta.summary || ''}</div>` +
          // Dual-unit POPULATION line (v0.2.5) — present only when the trial
          // reports an absolute mean; labeled population, never a patient target.
          (meta.population_line
            ? `<div class="cm-band-info-population" id="cm-band-info-population">${meta.population_line}</div>` : '') +
          `<div class="cm-band-info-citation">${meta.citation || ''}</div>` +
          (meta.estimated_bounds && meta.disclosure
            ? `<div class="cm-band-info-disclosure">${meta.disclosure}</div>` : '');
      } else {
        infoPanel.hidden = true;
        infoBtn.setAttribute('aria-expanded', 'false');
      }
      if (!this._infoWired) {
        this._infoWired = true;
        infoBtn.addEventListener('click', () => {
          const opening = infoPanel.hidden;
          infoPanel.hidden = !opening;
          infoBtn.setAttribute('aria-expanded', String(opening));
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && !infoPanel.hidden) {
            infoPanel.hidden = true;
            infoBtn.setAttribute('aria-expanded', 'false');
            infoBtn.focus();
          }
        });
      }
    }

    DiagnosticsPanel.recordTimestamp('ExpectedBandLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[ExpectedBandLayer] refresh() with no data'); return; }
    console.log('[ExpectedBandLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-band').selectAll('*').remove();
    this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 5. DataPointLayer — patient weight line + dots over calendar dates.
// ───────────────────────────────────────────────────────────────
const DataPointLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,
  _animated: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('DataPointLayer.init', this._loadedAt);
  },

  setData(data) {
    if (!this._isInitialized) this.init();
    this._data = Array.isArray(data) ? data : [];
  },

  render(data) {
    if (data !== undefined) this.setData(data);
    this._loadedAt = new Date().toISOString();
    console.log(`[DataPointLayer] render() at ${this._loadedAt} (${this._data.length} points)`);

    const pts = this._data
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date)
      .sort((a, b) => a._date - b._date);

    const g = CM.svg.select('.cm-layer-series');
    g.selectAll('*').remove();
    const inner = g.append('g').attr('class', 'cm-series');

    const line = d3.line().x(d => CM.x(d._date)).y(d => CM.y(d._w));
    inner.append('path')
      .attr('class', 'cm-series-path')
      .attr('fill', 'none').attr('stroke', '#3b8fcf').attr('stroke-width', 2.5)
      .attr('stroke-linejoin', 'round').attr('stroke-linecap', 'round')
      .attr('d', line(pts));

    inner.selectAll('circle').data(pts).join('circle')
      .attr('cx', d => CM.x(d._date)).attr('cy', d => CM.y(d._w))
      .attr('r', 4).attr('fill', '#3b8fcf');

    // Degraded-state notes (E4): single measurement / sparse series.
    const note = document.getElementById('cm-data-note');
    if (note) {
      if (pts.length === 1) {
        note.textContent = 'Single measurement — the trajectory will appear once the next weight is recorded.';
        note.style.display = 'block';
      } else if (pts.length === 2 || (pts.length > 2 &&
          ((pts[pts.length - 1]._date - pts[0]._date) / 86400000) / (pts.length - 1) > 30)) {
        note.textContent = 'Sparse data — trends between distant measurements are interpolated; interpretation limited.';
        note.style.display = 'block';
      } else {
        note.style.display = 'none';
      }
    }

    DiagnosticsPanel.recordTimestamp('DataPointLayer.render', this._loadedAt);
  },

  // Draw-in animation (E4), called ONCE after the final refresh pass so the
  // animated path is not replaced mid-flight. Dash trick on the path; the
  // attributes are removed at the end so no stray dasharray persists (and the
  // Tier-2 `line[stroke-dasharray]` selector never matches a path anyway).
  animateIn() {
    if (this._animated || !CM.svg) return;
    const path = CM.svg.select('.cm-layer-series .cm-series-path');
    if (path.empty() || !path.node().getTotalLength) return;
    const total = path.node().getTotalLength();
    if (!total) return;
    this._animated = true;
    path
      .attr('stroke-dasharray', `${total} ${total}`)
      .attr('stroke-dashoffset', total)
      .transition().duration(700).ease(d3.easeCubicOut)
      .attr('stroke-dashoffset', 0)
      .on('end', () => path.attr('stroke-dasharray', null).attr('stroke-dashoffset', null));
  },

  refresh() {
    if (!this._data) { console.warn('[DataPointLayer] refresh() with no data'); return; }
    console.log('[DataPointLayer] refresh()');
    this.render(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.select('.cm-layer-series').selectAll('*').remove();
    this._data = null; this._isInitialized = false; this._animated = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 6. AnnotationLayer — % TBWL label at the latest data point.
// ───────────────────────────────────────────────────────────────
const AnnotationLayer = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,

  init() {
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.init', this._loadedAt);
  },

  setData(data) {
    if (!this._isInitialized) this.init();

  render(data) {

    const g = CM.svg.select('.cm-layer-annotation');
    g.selectAll('*').remove();
    const points = DataPointLayer._data || [];
    if (this._data && points.length) {
      const last = points
        .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
        .filter(d => d._date)
        .sort((a, b) => a._date - b._date)
        .slice(-1)[0];
      if (last) {
        const pct = +this._data.tbwl_pct;
        // Clinical convention: positive TBWL = weight lost → show ↓ (good, green)
        //                      negative TBWL = weight gained → show ↑ (concern, red)
        const arrow = pct >= 0 ? '↓' : '↑';
        const inner = g.append('g').attr('class', 'cm-annotation');
        inner.append('text')
          .attr('x', CM.x(last._date)).attr('y', CM.y(last._w) - 14)
          .attr('text-anchor', 'middle').attr('font-size', '13px').attr('font-weight', 'bold')
          .attr('fill', pct >= 0 ? '#1f8a4c' : '#c0392b')
          .text(`${arrow}${Math.abs(pct).toFixed(1)}% TBWL`);
      }
    }
    DiagnosticsPanel.recordTimestamp('AnnotationLayer.render', this._loadedAt);
  },

  refresh() {
    if (!this._data) { console.warn('[AnnotationLayer] refresh() with no data'); return; }
    console.log('[AnnotationLayer] refresh()');
    this.render(this._data);
  },

  destroy() {

    this._data = null; this._isInitialized = false;
  },

// ───────────────────────────────────────────────────────────────
// 7. TooltipManager — hover tooltip. Event-driven, no render().
// ───────────────────────────────────────────────────────────────
const TooltipManager = {
  _data: null,
  _loadedAt: null,
  _isInitialized: false,
  _tip: null,

  init(data) {
    this._data = Array.isArray(data) ? data : [];
    this._isInitialized = true;
    this._loadedAt = new Date().toISOString();
    console.log(`[TooltipManager] init() at ${this._loadedAt}`);

    const layer = CM.svg.select('.cm-layer-tooltip');
    layer.selectAll('*').remove();
    this._tip = layer.append('g').attr('class', 'cm-tooltip').attr('display', 'none');
    this._tip.append('circle').attr('r', 5).attr('fill', '#0f619f');
    this._tip.append('text').attr('text-anchor', 'middle').attr('y', -26)
      .attr('font-size', '11px').attr('fill', '#1f2933');

    CM.svg
      .on('pointermove', (e) => this._onMove(e))
      .on('pointerleave', () => this._tip.attr('display', 'none'))
      .on('touchstart', (e) => e.preventDefault());

    DiagnosticsPanel.recordTimestamp('TooltipManager.init', this._loadedAt);
  },

  _onMove(event) {
    const pts = (this._data || [])
      .map(d => ({ ...d, _date: cmParseDate(d.date_obj), _w: +d.value_lbs }))
      .filter(d => d._date);
    if (!pts.length) return;
    const [mx] = d3.pointer(event);
    const i = d3.leastIndex(pts, d => Math.abs(CM.x(d._date) - mx));
    const p = pts[i];
    this._tip.attr('display', null)
      .attr('transform', `translate(${CM.x(p._date)},${CM.y(p._w)})`);
    this._tip.select('text')
      .text(`${p.date_label}: ${(+p.value_lbs).toFixed(1)} lb (${(+p.tbwl_pct).toFixed(1)}% TBWL)`);
  },

  refresh() {
    if (!this._isInitialized) { console.warn('[TooltipManager] refresh() before init()'); return; }
    console.log('[TooltipManager] refresh()');
    this.init(this._data);
  },

  destroy() {
    if (CM.svg) CM.svg.on('pointermove', null).on('pointerleave', null).on('touchstart', null);
    if (this._tip) this._tip.remove();
    this._tip = null; this._data = null; this._isInitialized = false;
  },
};

// ───────────────────────────────────────────────────────────────
// 8. ExportView — print-only header, stats block, citation footer (v0.3.0).
//    Values come from the server-assembled export_summary (same single
//    payload — no recomputation here). DOM is built with textContent so
//    patient-entered strings are never interpreted as HTML.
// ───────────────────────────────────────────────────────────────
const ExportView = {
  _data: null,
  _loadedAt: null,

  render(summary) {
    this._data = summary || null;
    this._loadedAt = new Date().toISOString();
    console.log(`[ExportView] render() at ${this._loadedAt}`);
    if (!summary) return;

    const el = (tag, cls, text) => {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (text !== undefined) node.textContent = text;
      return node;
    };

    // Header: name · DOB · export date (stamped at print time) · version.
    const header = document.getElementById('cm-print-header');
    if (header) {
      header.innerHTML = '';
      header.appendChild(el('div', 'cm-print-name', summary.patient_name));
      const meta = el('div');
      meta.appendChild(el('span', null, `DOB ${summary.patient_dob} · Exported `));
      const dateEl = el('span', null, '');
      dateEl.id = 'cm-print-date';
      meta.appendChild(dateEl);
      meta.appendChild(el('span', null,
        ` · GLP-1 weight trajectory summary · cardiometabolic_tracker v${summary.plugin_version}`));
      header.appendChild(meta);
    }

    // Stats block.
    const stats = document.getElementById('cm-print-stats');
    if (stats) {
      stats.innerHTML = '';
      const table = el('table');
      const row = (k, v) => {
        const tr = el('tr');
        tr.appendChild(el('td', 'k', k));
        tr.appendChild(el('td', null, v));
        table.appendChild(tr);
      };
      row('Baseline weight', `${summary.baseline_display} (${summary.baseline_date_label})`);
      row('Latest weight', `${summary.latest_display} (${summary.latest_date_label})`);
      row('Total weight change', summary.total_tbwl_display);
      row('Milestones', (summary.milestone_status || [])
        .map(m => `${m.pct}% ${m.reached ? '✓ ' + m.date_label : '—'}`)
        .join('  ·  '));
      const flagText = (summary.flags || []).map(f => f.label).join(', ');
      row(`${summary.velocity_window_weeks}-week velocity`,
        flagText ? `${summary.velocity_display} — ${flagText}` : summary.velocity_display);
      row('GLP-1 agent / reference band',
        `${(summary.agent || '').split('_')[0] || '—'} — Expected response (${summary.band_display})`);
      stats.appendChild(table);

      // Uncertainty disclosure survives into the export VERBATIM whenever the
      // band carries estimated bounds (clinical-integrity rule, v0.3.0).
      if (summary.estimated_bounds && summary.band_disclosure) {
        stats.appendChild(el('div', 'cm-print-disclosure', summary.band_disclosure));
      }
    }

    // Footer: the three shipped trial citations, verbatim from the payload.
    const footer = document.getElementById('cm-print-footer');
    if (footer) {
      footer.innerHTML = '';
      footer.appendChild(el('div', null, 'Reference trials:'));
      (summary.citations || []).forEach(c => footer.appendChild(el('div', null, c)));
    }

    DiagnosticsPanel.recordTimestamp('ExportView.render', this._loadedAt);
  },

  // Force the chart's final state so print never captures a mid-animation
  // frame or a hover tooltip; stamp the export date. Runs on the Export
  // button click AND on beforeprint (covers the browser's own print menu).
  finalizeForPrint() {
    const dateEl = document.getElementById('cm-print-date');
    if (dateEl) {
      // Local calendar date (R1, v0.4.0): toISOString() stamped the UTC
      // date, which is off by a day for clinicians near midnight outside UTC.
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      dateEl.textContent = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }
    if (CM.svg) {
      const path = CM.svg.select('.cm-layer-series .cm-series-path');
      if (!path.empty()) {
        path.interrupt().attr('stroke-dasharray', null).attr('stroke-dashoffset', null);
      }
      const tip = CM.svg.select('.cm-tooltip');
      if (!tip.empty()) tip.attr('display', 'none');
    }
  },

  destroy() {
    ['cm-print-header', 'cm-print-stats', 'cm-print-footer'].forEach(id => {
      const node = document.getElementById(id);
      if (node) node.innerHTML = '';
    });
    this._data = null;
  },
};

// ───────────────────────────────────────────────────────────────
// Initialization — order matters.
// ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const chartData = JSON.parse('{{ chart_data_json|escapejs }}');

  // Seed the event log FIRST: Python pipeline entries arrive pre-classified
  // in the server-built support-report scaffold; every component render below
  // appends its own runtime entries on top.
  DiagnosticsPanel.init(chartData.log_export_base, chartData.table_rows);

  StatsBar.render(chartData);
  ChartScaffold.init(chartData.chart_config);

  // Hand every layer its data FIRST, then compute scales exactly once, then
  // draw each layer once. (v0.2.2: layers no longer re-run the scaffold from
  // their own render(), which previously rebuilt scales/axes/gridlines 4-5x
  // per open.) Z-order is fixed by the scaffold's layer groups.
  ExpectedBandLayer.setData(chartData.expected_band);
  BaselineLayer.setData(chartData.baseline_data);
  MilestoneLayer.setData(chartData.milestones);
  DataPointLayer.setData(chartData.datapoints);
  AnnotationLayer.setData(chartData.latest_annotation);

  ChartScaffold.render();      // single scale/axes/gridline pass
  ExpectedBandLayer.render();
  BaselineLayer.render();
  MilestoneLayer.render();
  DataPointLayer.render();
  AnnotationLayer.render();
  TooltipManager.init(chartData.datapoints);
  DataPointLayer.animateIn();

  // Export / print pipeline (v0.3.0). window.print() prints only this
  // about:srcdoc iframe's document; the user saves as PDF from the dialog.
  ExportView.render(chartData.export_summary);
  const exportBtn = document.getElementById('cm-export-btn');
  if (exportBtn) {
    exportBtn.addEventListener('click', () => {
      ExportView.finalizeForPrint();
      window.print();
    });
  }
  window.addEventListener('beforeprint', () => ExportView.finalizeForPrint());

  DiagnosticsPanel.recordTimestamp('js.domContentLoaded', new Date().toISOString());

  // Shift+D toggles the event-log overlay; Esc closes it (D1).
  document.addEventListener('keydown', (e) => {
    if (e.shiftKey && (e.key === 'D' || e.key === 'd')) DiagnosticsPanel.toggle();
    else if (e.key === 'Escape' && DiagnosticsPanel._visible) DiagnosticsPanel.close();
  });
  const logClose = document.getElementById('cm-log-close-btn');
  if (logClose) logClose.addEventListener('click', () => DiagnosticsPanel.close());
  const logDownload = document.getElementById('cm-log-download-btn');
  if (logDownload) logDownload.addEventListener('click', () => DiagnosticsPanel.downloadSupportReport());
  const viewLog = document.getElementById('cm-log-view-log');
  if (viewLog) viewLog.addEventListener('click', () => DiagnosticsPanel.setView('log'));
  const viewData = document.getElementById('cm-log-view-data');
  if (viewData) viewData.addEventListener('click', () => DiagnosticsPanel.setView('data'));
});

// ───────────────────────────────────────────────────────────────
// Debug hooks exposed on window.
// ───────────────────────────────────────────────────────────────
window.refreshComponent = function (name) {
  const components = {
    StatsBar, ChartScaffold, ExpectedBandLayer, BaselineLayer,
    MilestoneLayer, DataPointLayer, AnnotationLayer,
  };
  if (!components[name]) { console.error(`Unknown component: ${name}`); return; }
  console.log(`[DEBUG] Refreshing ${name}`);
  components[name].refresh();
};

window.refreshAll = function () {
  [StatsBar, ChartScaffold, ExpectedBandLayer, BaselineLayer,
   MilestoneLayer, DataPointLayer, AnnotationLayer].forEach(c => c.refresh());
};
</script>
